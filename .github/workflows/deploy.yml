name: Test and deploy

# Root of the site is built from main and tracks current guidance.
# Every tag v<version> is additionally published as an immutable copy at
# /v<version>/, so a study citing a version can be checked against exactly
# what it cited. Versioned copies are never rebuilt or overwritten.

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Tags and full history, so the stamped commit is meaningful.
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          # Pinned: an unpinned toolchain means the site cannot be rebuilt
          # identically later, which would be an awkward property for a
          # reproducibility framework.
          version: "1.9.38"

      - name: Install dependencies
        run: uv sync --extra dev --extra docs --frozen

      # The diagnostics are tested before the site that documents them is built.
      # A detector that silently stops detecting must fail the build, not ship.
      - name: Run tests
        run: uv run pytest -q

      # The citable specification and the site change at different rates.
      # This fails a PR that edits a taxonomy row or checklist item without
      # bumping spec_version, so two sets of requirements cannot ship under
      # one number.
      - name: Check spec version was bumped if normative content changed
        if: github.event_name == 'pull_request'
        run: uv run python tools/check_spec_version.py origin/${{ github.base_ref }}

      - name: Determine release identity
        id: release
        run: |
          VERSION=$(uv run python -c "import yaml,pathlib; \
            print(yaml.safe_load(pathlib.Path('spec/spec.yml').read_text())['spec_version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "is_release=true" >> "$GITHUB_OUTPUT"
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            # A tag must agree with the declared spec version, or the
            # published snapshot would not be the specification it claims.
            if [ "v$VERSION" != "${GITHUB_REF_NAME}" ]; then
              echo "::error::tag ${GITHUB_REF_NAME} does not match spec_version $VERSION"
              exit 1
            fi
          else
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          fi

      # Versioned copies are self-contained: absolute URLs in the sitemap and
      # llms.txt must point inside the version, not back at the root.
      - name: Point absolute URLs at the versioned copy
        if: steps.release.outputs.is_release == 'true'
        run: |
          sed -i "s|site-url: https://acquire-framework.github.io|site-url: https://acquire-framework.github.io/v${{ steps.release.outputs.version }}|" _quarto.yml

      - name: Stamp version and commit provenance
        env:
          ACQUIRE_RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: uv run python tools/stamp_version.py

      # The CSV and Markdown forms of the taxonomy and checklist are derived
      # from the YAML sources rather than committed, so they cannot drift.
      - name: Export machine-readable artifact forms
        run: uv run python tools/export_artifact.py

      - name: Render site
        env:
          QUARTO_PYTHON: .venv/bin/python
        run: uv run quarto render

      # Guards against working notes reaching the public site: only .qmd pages
      # are rendered, so anything under a notes directory appearing in _site
      # means the render list was widened by mistake.
      - name: Verify no working notes were published
        run: |
          for d in docs notes planning private; do
            if [ -e "_site/$d" ]; then
              echo "::error::_site/$d should not be published"
              exit 1
            fi
          done
          echo "clean"

      # ── publish ──────────────────────────────────────────────────────────
      # The root must mirror _site exactly, so a page deleted from the source
      # disappears from the site. keep_files would prevent that — it preserves
      # everything, including pages that no longer exist. Instead the published
      # snapshots are carried forward explicitly and the root replaced whole.

      - name: Carry published snapshots into the new root
        if: github.ref == 'refs/heads/main'
        run: |
          git fetch origin gh-pages --depth=1 || exit 0
          git worktree add /tmp/published origin/gh-pages
          for dir in /tmp/published/v*/; do
            [ -d "$dir" ] || continue
            echo "preserving $(basename "$dir")"
            cp -R "$dir" ./_site/
          done
          git worktree remove --force /tmp/published

      - name: Publish current guidance to the site root
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          # Root mirrors _site exactly; snapshots were copied in above.
          keep_files: false
          commit_message: "site: ${{ github.sha }}"

      - name: Publish immutable versioned copy
        if: steps.release.outputs.is_release == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          destination_dir: v${{ steps.release.outputs.version }}
          keep_files: true
          commit_message: "release: v${{ steps.release.outputs.version }} (${{ github.sha }})"
