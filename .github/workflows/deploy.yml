name: Test and deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          # Pinned: an unpinned toolchain means the site cannot be rebuilt
          # identically later, which would be an awkward property for a
          # reproducibility framework.
          version: "1.9.38"

      - name: Install dependencies
        run: uv sync --extra dev --extra docs --frozen

      # The diagnostics are tested before the site that documents them is built.
      # A detector that silently stops detecting must fail the build, not ship.
      - name: Run tests
        run: uv run pytest -q

      - name: Render site
        env:
          QUARTO_PYTHON: .venv/bin/python
        run: uv run quarto render

      - name: Verify internal planning docs were not published
        run: |
          if grep -rlqi "working notes" _site 2>/dev/null; then
            echo "::error::Internal planning material found in _site"
            exit 1
          fi
          echo "clean"

      - name: Upload artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
