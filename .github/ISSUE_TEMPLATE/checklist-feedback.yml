name: Score or challenge a checklist item
description: >-
  Tell us an MRC item is wrong, unmeasurable, redundant, or missing. Public
  disagreement is how v26.7 becomes something worth adopting.
title: "[checklist] "
labels: ["checklist", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        The Minimum Reporting Checklist is **v26.7 and one group's opinion**. It
        has not been evaluated for usability, coverage, or inter-rater
        agreement, and no claim is made that applying it improves study
        outcomes.

        It becomes a community instrument only if other groups use it and
        disagree with it in public. Items you think are unmeasurable,
        disproportionate, or missing are the most useful feedback we can get.

  - type: dropdown
    id: item
    attributes:
      label: Which item?
      options:
        - "MRC-01 Expected vs observed completeness"
        - "MRC-02 Missingness statistics and attribution"
        - "MRC-03 Device, OS, app and firmware versions"
        - "MRC-04 Timestamping, synchronization, residual uncertainty"
        - "MRC-05 Accuracy or uncertainty statement"
        - "MRC-06 Retry, deduplication, integrity verification"
        - "MRC-07 Context and system-health events"
        - "MRC-08 Machine-readable schema and software"
        - "MRC-09 QC exclusions and preprocessing provenance"
        - "MRC-10 Pre-deployment verification evidence"
        - "A missing item — something the checklist should ask and does not"
    validations:
      required: true

  - type: dropdown
    id: kind
    attributes:
      label: What is the problem?
      options:
        - "Unmeasurable — cannot be answered even by a diligent study"
        - "Ambiguous — two careful people would answer differently"
        - "Disproportionate — burden exceeds the value for typical studies"
        - "Redundant — already covered by another item"
        - "Missing — a failure mode the checklist does not reach"
        - "Wrong tier — should be core rather than conditional, or the reverse"
    validations:
      required: true

  - type: textarea
    id: detail
    attributes:
      label: Explain
      description: >-
        If you tried to apply the item to a real study, describe what happened.
        Concrete failure to apply is stronger evidence than an opinion.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed wording, if you have one
      description: >-
        Items should be verifiable statements — something a study either did or
        did not do and can report. "Consider power management" is not
        actionable; "effective sampling rate verified against nominal on every
        device model" is.

  - type: textarea
    id: context
    attributes:
      label: Your context
      description: >-
        Discipline, study type, and role (author, reviewer, curator, student).
        This helps us see whether an item fails for a specific community.
