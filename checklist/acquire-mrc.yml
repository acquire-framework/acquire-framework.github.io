# ACQUIRE Minimum Reporting Checklist (MRC) v26.7
#
# Machine-readable form of Table 2 of the accompanying paper. Each item derives
# from a row of the taxonomy (taxonomy/acquire-taxonomy.yml) and is intended to
# be auditable by a reviewer and proportionate to the study's measurand and risk.
#
# This checklist reports a different object than CONSORT-EHEALTH or mERA, which
# standardize the reporting of interventions. ACQUIRE reports the measuring
# system, and is complementary to them.
#
# property:  M   measurement validity
#            EN  record integrity and provenance
#            O   observation-process validity
#
# tier:      core         disclose in every study using this framework
#            conditional  disclose where the measurand or risk warrants it
#
# auto:      which fields the shipped diagnostics can populate directly from the
#            data and logs, so that disclosure is a by-product of validation
#            rather than unpaid reporting work.

spec_version: "26.7"   # see spec/spec.yml
updated: "2026-07-18"
paper: "Danioł & Sroka (2026), UbiComp/ISWC '26 Companion"

items:
  - id: MRC-01
    tier: core
    statement: >-
      Expected versus observed completeness, per modality, with the sampling and
      background-execution policy.
    property: [O]
    taxonomy: [ACQ-F01]
    auto: partial
    auto_note: >-
      Observed completeness and effective rate are computed by `acquire check`
      (TIME-01, TIME-02). Expected completeness and the background-execution
      policy are author-supplied.

  - id: MRC-02
    tier: core
    statement: >-
      Missingness statistics and their suspected attribution (technical /
      adherence / attrition), with the evidence used.
    property: [O]
    taxonomy: [ACQ-F01, ACQ-F04, ACQ-F05]
    auto: partial
    auto_note: >-
      Gap counts, durations and their distribution over time are computed.
      Attribution is an author judgement and must be argued, not asserted —
      published completeness figures routinely conflate these three causes.

  - id: MRC-03
    tier: core
    statement: >-
      Device models, OS versions, app and firmware versions, and every mid-study
      change.
    property: [M, EN]
    taxonomy: [ACQ-F06]
    auto: partial
    auto_note: >-
      Populated automatically where the collection app records these per
      recording, as the provenance template specifies.

  - id: MRC-04
    tier: core
    statement: >-
      Timestamping source, synchronization policy, and residual clock
      uncertainty after reconciliation.
    property: [M]
    taxonomy: [ACQ-F03]
    auto: partial
    auto_note: >-
      Monotonicity and regularity are checked automatically. The residual
      synchronization uncertainty must be estimated from the study's own offset
      logs — see examples/synchronization for the model and a worked budget.

  - id: MRC-05
    tier: conditional
    statement: >-
      An accuracy or uncertainty statement appropriate to each primary derived
      measurand, or a documented justification of why quantitative uncertainty
      could not be established and what validation evidence is provided instead.
    property: [M]
    taxonomy: [ACQ-F08]
    auto: false
    justification_floor: >-
      A justification is acceptable only if it names the dominant uncertainty
      sources, states why each could not be quantified, and describes the
      validation evidence offered in place of a budget. "Uncertainty could not
      be established" alone does not satisfy this item.

  - id: MRC-06
    tier: core
    statement: >-
      Upload retry, deduplication, and integrity-verification logic (checksums,
      sequence numbers).
    property: [EN]
    taxonomy: [ACQ-F02]
    auto: false
    auto_note: >-
      A property of the collection system's design, disclosed by the author.

  - id: MRC-07
    tier: core
    statement: >-
      Context and system-health events recorded alongside the data: power state,
      connectivity, permissions; crashes and service kills.
    property: [EN]
    taxonomy: [ACQ-F01, ACQ-F02, ACQ-F04]
    auto: false
    auto_note: >-
      Cloud error-tracking alone is insufficient: a process killed while offline
      disables the reporting channel in the same stroke. Health events must be
      written durably on-device and synced opportunistically.

  - id: MRC-08
    tier: core
    statement: >-
      Machine-readable schema and collection-software artifacts published
      alongside the data.
    property: [EN]
    taxonomy: [ACQ-F07]
    auto: false
    template: templates/sensor-schema.yml

  - id: MRC-09
    tier: core
    statement: >-
      QC exclusion criteria and preprocessing provenance from raw log to
      released dataset.
    property: [EN]
    taxonomy: [ACQ-F07]
    auto: partial
    auto_note: >-
      Diagnostic results and the thresholds that produced them are emitted by
      `acquire check` and can be attached verbatim as the QC record.
    template: templates/dataset-provenance.yml

  - id: MRC-10
    tier: conditional
    statement: >-
      Pre-deployment verification evidence: which failure modes of the taxonomy
      were tested, how, and with what observed behaviour.
    property: [M, EN, O]
    taxonomy: [ACQ-F01, ACQ-F02, ACQ-F03, ACQ-F04, ACQ-F06]
    auto: false
    auto_note: >-
      Failure injection, a soak test on representative devices including
      aggressive vendor-optimizer handsets, and an end-to-end integrity drill.
      A full verification protocol is a planned future artifact.
