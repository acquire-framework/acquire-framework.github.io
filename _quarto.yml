project:
  type: website
  output-dir: _site
  # Execute every page from the project root so paths and the shared `acqsite`
  # helper resolve identically regardless of where a page lives.
  execute-dir: project
  # Only .qmd pages are published, so working notes kept alongside the project
  # cannot reach the public site by accident.
  render:
    - "**/*.qmd"
  resources:
    # Anchored to the project root: an unanchored "robots.txt" matches
    # recursively and drags in fixtures from installed packages.
    - "/robots.txt"
    - "/assets/**"
    # Raw artifact files, served so they can be downloaded from the site itself
    # rather than only from the repository.
    - "/templates/*.yml"
    - "/templates/*.md"
    - "/taxonomy/*.yml"
    - "/checklist/*.yml"
    - "/spec/*.yml"
    - "/dist/**"
    - "/examples/**"

website:
  title: "ACQUIRE Framework"
  # Emits llms.txt and per-page .llms.md with rewritten internal links.
  # Published as an agent-facing index, not as an SEO measure — crawlers
  # demonstrably do not consume it. See the design document for the evidence.
  llms-txt: true
  description: >-
    A taxonomy, reporting checklist and templates for reproducible in-the-wild
    sensing studies.
  site-url: https://acquire-framework.github.io
  repo-url: https://github.com/acquire-framework/acquire-framework.github.io
  repo-actions: [edit, issue]
  search:
    location: navbar
    type: overlay
  navbar:
    logo-alt: "ACQUIRE"
    # Ordered to mirror the paper: taxonomy, then the checklist derived from it,
    # then the operational material built on top.
    left:
      - text: "Taxonomy"
        href: taxonomy/index.qmd
      - text: "Checklist"
        href: checklist/index.qmd
      - text: "Templates"
        href: templates/index.qmd
      - text: "Failure catalogue"
        href: recipes/index.qmd
      - text: "Guideline book"
        href: lifecycle/index.qmd
    right:
      - icon: github
        href: https://github.com/acquire-framework/acquire-framework.github.io
        aria-label: GitHub
  sidebar:
    - id: lifecycle
      title: "Guideline book"
      style: floating
      contents:
        - lifecycle/index.qmd
        - section: "Study lifecycle"
          contents:
            - lifecycle/design.qmd
            - lifecycle/instrument.qmd
            - lifecycle/pilot.qmd
            - lifecycle/deploy.qmd
            - lifecycle/monitor.qmd
            - lifecycle/curate.qmd
            - lifecycle/release.qmd
  page-footer:
    border: true
    left: |
      [![AGH University of Krakow](/assets/agh-logo.svg){.agh-mark fig-alt="AGH University of Krakow"}](https://www.agh.edu.pl/en)
    center: |
      Maintained at the Department of Measurements and Electronics,
      AGH University of Krakow
    right: |
      ACQUIRE spec {{< var spec_version >}} · site build [`{{< var commit_short >}}`]({{< var commit_url >}}) · built {{< var build_date >}}
      [Licensing](/licensing.qmd) · [How to cite](/cite.qmd) · [All versions](/versions.qmd)

format:
  html:
    # Light is the default and the primary design target; the dark variant is
    # available from the navbar toggle. One stylesheet serves both — see
    # styles/instrument.scss, which switches on body.quarto-dark.
    theme:
      light: [cosmo, styles/instrument.scss]
      dark: [darkly, styles/instrument.scss]
    # Wider body column so build-time figures (936 px at the size acqsite.py
    # renders them) fit without horizontal scroll. Prose is kept to a readable
    # measure separately in instrument.scss, so widening the column widens the
    # space available to figures and tables rather than the line length.
    grid:
      body-width: 1150px
      sidebar-width: 270px
      margin-width: 200px
    # Generated by tools/stamp_version.py: empty on development builds, a
    # snapshot notice on the immutable /v<version>/ copies.
    include-before-body: _banner.html
    toc: true
    toc-depth: 3
    anchor-sections: true
    code-copy: true
    code-overflow: wrap
    link-external-newwindow: true
    email-obfuscation: javascript


# Freeze is deliberately OFF. It caches a page's output against changes to the
# .qmd alone, but several pages read the taxonomy, checklist and templates from
# YAML at build time — files Quarto does not track as dependencies. With freeze
# on, editing a normative source file silently republished the previous
# content. For this project that trade is not available: a stale build is a
# correctness failure, and a full render costs under a minute.
execute:
  freeze: false
  echo: true
  warning: false

bibliography: references.bib

# Without explicit metadata Quarto emits an empty @online{untitled,...} stub on
# every page. Pointing it at the citable artifact means any page a reader lands
# on offers the correct citation. No paper is cited: the manuscript is in
# preparation and has not been published.
citation:
  id: acquire_2026
  type: software
  title: >-
    ACQUIRE: Acquisition Criteria for Quality, Uncertainty, Integrity,
    Reproducibility, and Evidence
  author:
    - name:
        given: Mateusz
        family: Danioł
      email: daniol@agh.edu.pl
    - name:
        given: Ryszard
        family: Sroka
      email: rsroka@agh.edu.pl
  version: 26.7.2
  issued: 2026
  url: https://acquire-framework.github.io
