# The ACQUIRE specification manifest.
#
# This file declares the version of the framework's NORMATIVE content — the
# things a study cites when it says "assessed against ACQUIRE 26.7".
#
# It is deliberately separate from:
#
#   * the website, which has no version of its own and is identified only by
#     its build commit. Rewording a paragraph, fixing a typo, or restyling a
#     page changes what a reader sees but not what the framework requires.
#
#   * the supporting code, which needs fixes that do not change any
#     requirement, and is not part of what a study cites.
#
# Conflating them would mean either that a typo fix bumps the number studies
# cite, or that a published snapshot silently diverges from the site.

spec_version: "26.7.2"
released: "2026-07-19"
doi: null # minted on archival deposit

# Files whose content is normative. Changing any of these requires a
# spec_version bump; CI enforces this (tools/check_spec_version.py).
normative:
  - spec/spec.yml
  - taxonomy/acquire-taxonomy.yml
  - checklist/acquire-mrc.yml

# Everything else — .qmd pages, styles, templates, examples, package code — is
# explanatory or implementing material. It may change freely between spec
# versions, and does not alter what a study was assessed against.
#
# Templates carry their own `schema_version` because a study may have filled
# one in under an earlier format; that is a third, independent lifecycle.

changelog:
  - version: "26.7.2"
    date: "2026-07-19"
    summary: >-
      Clarifies four checklist statements in light of published evidence on wear
      time, missingness structure, and restricted-access datasets. The taxonomy
      is unchanged: the same eight rows, and the same ten checklist items with
      unchanged identifiers, tiers, properties and taxonomy mappings.
    changes:
      - MRC-01 now asks for wear time alongside completeness, and for the
        valid-observation criteria used, since derived estimates depend on the
        wear-time definition applied.
      - MRC-02 now asks for the temporal pattern of missingness and names
        non-wear as a distinct attribution alongside technical loss, adherence
        and attrition, because the structure and timing of missing data support
        inference about plausible loss mechanisms.
      - MRC-08 now asks for timestamp semantics and quality-flag definitions,
        and accepts an availability statement documenting proprietary, ethical
        or licensing restrictions where artifacts cannot be published. The
        previous wording was not satisfiable by restricted-access studies.
      - MRC-09 now names wear-time rules and valid-day thresholds among the
        preprocessing decisions to disclose, where applicable.

  - version: "26.7.1"
    date: "2026-07-18"
    summary: >-
      Removes implementation-availability metadata from the normative content.
      The requirements themselves are unchanged: the same eight taxonomy rows
      and the same ten checklist items, with identical wording.
    changes:
      - Removed the `auto` field from checklist items. It recorded which items
        could be populated automatically, which is a statement about tooling
        rather than about what a study must disclose, and no such tooling is
        published.
      - Removed `detectable_by` from taxonomy rows and the `detectors` index,
        for the same reason.
    note: >-
      Specification 26.7 was published on 2026-07-18 and withdrawn the same day,
      before any known use, because it asserted the availability of diagnostic
      software that is not released. It is not served, and should not be cited.
      Snapshots are otherwise never rewritten; this one was withdrawn rather
      than altered.

  - version: "26.7"
    date: "2026-07-18"
    status: withdrawn
    summary: >-
      First public release. Eight-row acquisition-failure taxonomy across five
      system layers; ten-item Minimum Reporting Checklist with core and
      conditional tiers, a justification floor on MRC-05, and per-item mapping
      to the taxonomy rows each derives from.
    changes:
      - Initial taxonomy (ACQ-F01 … ACQ-F08)
      - Initial Minimum Reporting Checklist (MRC-01 … MRC-10)
